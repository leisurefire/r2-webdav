name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run format:check

  litmus:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_USERNAME: test
      TEST_PASSWORD: test
      WRANGLER_PORT: 8787
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install litmus
        run: |
          sudo apt-get update
          sudo apt-get install -y litmus
      - name: Configure credentials
        run: |
          cat <<EOF > apps/dav-worker/.dev.vars
          USERNAME=${TEST_USERNAME}
          PASSWORD=${TEST_PASSWORD}
          JWT_SECRET=ci-only-jwt-secret
          EOF
      - name: Start Worker
        run: |
          nohup npm run dev -w @r2-webdav/dav-worker -- --local --port "${WRANGLER_PORT}" > /tmp/wrangler.log 2>&1 &
          echo $! > /tmp/wrangler.pid
      - name: Wait for Worker
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --user "${TEST_USERNAME}:${TEST_PASSWORD}" "http://127.0.0.1:${WRANGLER_PORT}/" > /dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/wrangler.log
          exit 1
      - name: Run WebDAV suites
        env:
          TESTS: basic copymove props locks
        run: TESTS="$TESTS" litmus -k "http://127.0.0.1:${WRANGLER_PORT}/" "${TEST_USERNAME}" "${TEST_PASSWORD}"
      - if: failure()
        run: cat /tmp/wrangler.log
      - if: always()
        run: kill "$(cat /tmp/wrangler.pid)" || true
